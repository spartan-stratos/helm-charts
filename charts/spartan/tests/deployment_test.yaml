suite: "Deployment template tests"

templates:
  - "templates/deployment.yaml"
  - "templates/configmap.yaml"
  - "templates/secret.yaml"

tests:
  - it: "renders global podLabels on the main deployment pod template"
    template: "templates/deployment.yaml"
    set:
      podLabels:
        team: platform
        environment: production
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.metadata.labels.team
          value: platform
      - equal:
          path: spec.template.metadata.labels.environment
          value: production

  - it: "emits checksum/configmap + checksum/secret on pod template"
    template: "templates/deployment.yaml"
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/configmap"]
      - exists:
          path: spec.template.metadata.annotations["checksum/secret"]

  - it: "checksum/configmap hash changes when configMap data changes"
    template: "templates/deployment.yaml"
    set:
      configMap:
        asEnv:
          enabled: true
          data:
            FOO: "v1"
    asserts:
      - notEqual:
          path: spec.template.metadata.annotations["checksum/configmap"]
          value: "316deeb28892b1cdebfe5c12c2cd620b5b8f29289c1ffe3d4f5fc1b2e6a4ea7d"

  - it: "merges chart checksum annotations with user-supplied podAnnotations"
    template: "templates/deployment.yaml"
    set:
      podAnnotations:
        custom.io/foo: bar
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/configmap"]
      - exists:
          path: spec.template.metadata.annotations["checksum/secret"]
      - equal:
          path: spec.template.metadata.annotations["custom.io/foo"]
          value: bar

  - it: "skipDeployment sidecar is not attached to the Deployment"
    template: "templates/deployment.yaml"
    set:
      sidecars:
        - name: datadog-agent
          image: datadog/agent
          sharedVolume:
            mountPath: /var/log/application/
        - name: log-collector
          image: fluent/fluent-bit:3.1.9
          skipDeployment: true
          sharedVolume:
            mountPath: /var/log/application/
    asserts:
      # main container + datadog-agent only; log-collector is hook-only
      - lengthEqual:
          path: spec.template.spec.containers
          count: 2
      - equal:
          path: spec.template.spec.containers[1].name
          value: datadog-agent
      # the skipDeployment sidecar's subPath mount is absent from the main container
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: sidecar-volume
            readOnly: false
            mountPath: /var/log/application/
            subPath: log-collector

  - it: "datadog cluster-agent and orchestrator-explorer toggles default to true"
    template: "templates/deployment.yaml"
    set:
      datadog:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DD_CLUSTER_AGENT_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DD_ORCHESTRATOR_EXPLORER_ENABLED
            value: "true"

  - it: "disabling clusterAgentEnabled + orchestratorExplorerEnabled silences the cluster-agent noise"
    template: "templates/deployment.yaml"
    set:
      datadog:
        enabled: true
        clusterAgentEnabled: false
        orchestratorExplorerEnabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DD_CLUSTER_AGENT_ENABLED
            value: "false"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DD_ORCHESTRATOR_EXPLORER_ENABLED
            value: "false"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: DD_CLUSTER_AGENT_ENABLED
            value: "true"
