suite: "Hook template tests"

templates:
  - "templates/hook.yaml"

tests:
  - it: "renders hook delete policy and keeps hook wiring intact"
    set:
      image.repository: test-image
      image.tag: test-tag
      imagePullSecrets:
        - name: regcred
      serviceAccount.name: service-platform
      secret.externalSecretEnv.enabled: true
      secret.externalSecretEnv.name: service-platform-env-var
      configMap.externalConfigMapEnv.enabled: true
      configMap.externalConfigMapEnv.name: service-platform-config-map
      extraEnvs:
        - name: GLOBAL_ENV
          value: global
      hooks:
        - name: migration
          hookTypes: pre-install,pre-upgrade
          deletePolicy: before-hook-creation
          shell: /bin/sh
          commands:
            - yarn run migrate:up
          resources: {}
          customImage:
            enabled: true
            image: migration-image:test
          restartPolicy: Never
          backoffLimit: 0
          extraEnvs:
            - name: HOOK_ENV
              value: hook
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation
      - notExists:
          path: metadata.annotations["helm.sh/resource-policy"]
      - equal:
          path: spec.template.spec.serviceAccountName
          value: service-platform
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: regcred
      - equal:
          path: spec.template.spec.containers[0].image
          value: migration-image:test
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: service-platform-env-var
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].configMapRef.name
          value: service-platform-config-map
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GLOBAL_ENV
            value: global
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOOK_ENV
            value: hook

  - it: "keeps legacy resource-policy annotation when delete policy is unset"
    set:
      hooks:
        - name: migration
          hookTypes: pre-install,pre-upgrade
          shell: /bin/sh
          commands:
            - yarn run migrate:up
          resources: {}
          customImage:
            enabled: false
            image: busybox
          restartPolicy: Never
          backoffLimit: 0
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
      - notExists:
          path: metadata.annotations["helm.sh/hook-delete-policy"]

  - it: "renders global podLabels on hook pod templates"
    set:
      podLabels:
        team: platform
        environment: production
      hooks:
        - name: migration
          hookTypes: pre-install
          shell: /bin/sh
          commands:
            - echo migration
          resources: {}
          customImage:
            enabled: false
            image: busybox
          restartPolicy: Never
          backoffLimit: 0
    asserts:
      - isKind:
          of: Job
      - equal:
          path: spec.template.metadata.labels.team
          value: platform
      - equal:
          path: spec.template.metadata.labels.environment
          value: production

  - it: "uses a custom logCollector sidecar instead of the datadog agent"
    set:
      datadog:
        enabled: false
      sidecars:
        - name: log-collector
          image: fluent/fluent-bit:3.1.9
          sharedVolume:
            mountPath: /var/log/application/
      hooks:
        - name: migration
          hookTypes: pre-install,pre-upgrade
          shell: /bin/sh
          commands:
            - flyway migrate
          resources: {}
          customImage:
            enabled: true
            image: migration-image:test
          restartPolicy: Never
          backoffLimit: 0
          collectLog: true
          logCollector:
            sidecarName: log-collector
            readyCommand: "test -f /var/log/application/app.log"
            stopCommand: "pkill fluent-bit"
    asserts:
      - isKind:
          of: Job
      # process namespace still shared so the trap can stop the collector
      - equal:
          path: spec.template.spec.shareProcessNamespace
          value: true
      # new collector's shutdown + readiness wiring is rendered
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "pkill fluent-bit"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "test -f /var/log/application/app.log"
      # legacy datadog-agent wiring is gone
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "pkill agent"
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "localhost:8126"
      # no datadog env injected for a non-agent collector (no extraEnvs set → env is empty)
      - isNullOrEmpty:
          path: spec.template.spec.containers[0].env
      # the configured sidecar is attached to the hook pod
      - equal:
          path: spec.template.spec.containers[1].name
          value: log-collector

  - it: "fails fast when a non-datadog collector omits readyCommand"
    set:
      datadog:
        enabled: false
      sidecars:
        - name: log-collector
          image: fluent/fluent-bit:3.1.9
      hooks:
        - name: migration
          hookTypes: pre-install
          shell: /bin/sh
          commands:
            - flyway migrate
          resources: {}
          customImage:
            enabled: true
            image: migration-image:test
          restartPolicy: Never
          backoffLimit: 0
          collectLog: true
          logCollector:
            sidecarName: log-collector
    asserts:
      - failedTemplate:
          errorPattern: "logCollector.readyCommand"

  - it: "fails fast when a non-datadog collector omits stopCommand"
    set:
      datadog:
        enabled: false
      sidecars:
        - name: log-collector
          image: fluent/fluent-bit:3.1.9
      hooks:
        - name: migration
          hookTypes: pre-install
          shell: /bin/sh
          commands:
            - flyway migrate
          resources: {}
          customImage:
            enabled: true
            image: migration-image:test
          restartPolicy: Never
          backoffLimit: 0
          collectLog: true
          logCollector:
            sidecarName: log-collector
            readyCommand: "test -f /x"
    asserts:
      - failedTemplate:
          errorPattern: "logCollector.stopCommand"

  - it: "fails fast when logCollector.sidecarName matches no configured sidecar"
    set:
      datadog:
        enabled: false
      sidecars:
        - name: log-collector
          image: fluent/fluent-bit:3.1.9
      hooks:
        - name: migration
          hookTypes: pre-install
          shell: /bin/sh
          commands:
            - flyway migrate
          resources: {}
          customImage:
            enabled: true
            image: migration-image:test
          restartPolicy: Never
          backoffLimit: 0
          collectLog: true
          logCollector:
            sidecarName: typo-collector
            readyCommand: "test -f /x"
            stopCommand: "pkill fluent-bit"
    asserts:
      - failedTemplate:
          errorPattern: "does not match any configured sidecar"

  - it: "fails fast when logCollector omits sidecarName and no datadog-agent sidecar exists"
    set:
      datadog:
        enabled: false
      sidecars:
        - name: metrics
          image: some/metrics
      hooks:
        - name: migration
          hookTypes: pre-install
          shell: /bin/sh
          commands:
            - flyway migrate
          resources: {}
          customImage:
            enabled: true
            image: migration-image:test
          restartPolicy: Never
          backoffLimit: 0
          collectLog: true
          # logCollector present (overriding only stopCommand) but no sidecarName ->
          # resolves to the default "datadog-agent", which is not in sidecars -> fail
          logCollector:
            stopCommand: "sleep 5 && pkill agent"
    asserts:
      - failedTemplate:
          errorPattern: "does not match any configured sidecar"

  - it: "drains deterministically until the collector flushes, without a fixed sleep or a stopCommand"
    set:
      datadog:
        enabled: false
      sidecars:
        - name: log-collector
          image: fluent/fluent-bit:3.1.9
          sharedVolume:
            mountPath: /var/log/application/
      hooks:
        - name: migration
          hookTypes: pre-install,pre-upgrade
          shell: /bin/sh
          commands:
            - flyway migrate
          resources: {}
          customImage:
            enabled: true
            image: migration-image:test
          restartPolicy: Never
          backoffLimit: 0
          collectLog: true
          # no stopCommand: drain.enabled is the stop mechanism
          logCollector:
            sidecarName: log-collector
            readyCommand: "while ! curl -Ns localhost:2020/api/v1/health; do sleep 1; done"
            drain:
              enabled: true
    asserts:
      - isKind:
          of: Job
      # deterministic drain wiring: trap the generated function, poll flush state, then pkill
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "trap __spartan_drain EXIT"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "proc_records"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'pkill "?fluent-bit"?'
      # no fixed-sleep stop and no leftover datadog-agent wiring
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "pkill agent"
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "localhost:8126"

  - it: "fails fast when drain.enabled is set on the datadog-agent collector"
    set:
      datadog:
        enabled: true
      sidecars:
        - name: datadog-agent
          image: public.ecr.aws/datadog/agent:latest
      hooks:
        - name: migration
          hookTypes: pre-install
          shell: /bin/sh
          commands:
            - flyway migrate
          resources: {}
          customImage:
            enabled: true
            image: migration-image:test
          restartPolicy: Never
          backoffLimit: 0
          collectLog: true
          logCollector:
            drain:
              enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "drain.enabled with the datadog-agent collector"

  - it: "honors custom drain metricsUrl, processName and maxWaitSeconds"
    set:
      datadog:
        enabled: false
      sidecars:
        - name: log-collector
          image: fluent/fluent-bit:3.1.9
      hooks:
        - name: migration
          hookTypes: pre-install
          shell: /bin/sh
          commands:
            - flyway migrate
          resources: {}
          customImage:
            enabled: true
            image: migration-image:test
          restartPolicy: Never
          backoffLimit: 0
          collectLog: true
          logCollector:
            sidecarName: log-collector
            readyCommand: "test -f /x"
            drain:
              enabled: true
              metricsUrl: "http://localhost:9999/metrics"
              processName: my-collector
              maxWaitSeconds: 30
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "localhost:9999/metrics"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'pkill "?my-collector"?'
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "_max=30"
