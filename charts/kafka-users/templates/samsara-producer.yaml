{{- if .Values.samsaraProducer.enabled -}}
# samsara-producer — external Kafka Connector authenticated via SASL/SCRAM.
# Credential lives in AWS Secrets Manager (created by infra-terraform
# module.samsara_producer); this CRD only declares ACL.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: samsara-producer
  namespace: {{ .Values.namespace }}
  labels:
    strimzi.io/cluster: {{ .Values.clusterLabel }}
spec:
  authorization:
    type: simple
    acls:
      # Allow: produce to samsara.* topic prefix.
      - resource:
          type: topic
          name: {{ .Values.samsaraProducer.topicPrefix | quote }}
          patternType: prefix
        operations: [Write, Describe]
        type: allow
      # Allow: IdempotentWrite at the cluster level — required for
      # producers running with enable.idempotence = true (Kafka 3.0+
      # default).
      - resource:
          type: cluster
        operations: [IdempotentWrite]
        type: allow
      # Deny: explicit block on every fleet.* prefix listed in values.
      # Defense in depth — survives an accidental flag-flip back to
      # `allow.everyone.if.no.acl.found = true`.
      {{- range .Values.samsaraProducer.deniedTopicPrefixes }}
      - resource:
          type: topic
          name: {{ . | quote }}
          patternType: prefix
        operations: [All]
        type: deny
      {{- end }}
{{- end -}}
