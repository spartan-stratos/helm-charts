# Strimzi User Operator (standalone) defaults. Override per env.
# See values-dev.yaml / values-prod.yaml for env-specific bindings.

# Environment label — surfaces in pod labels / observability + drives the
# KafkaUser CRD `strimzi.io/cluster` selector. Set per env file.
env: ""

# Namespace the operator lives in. This chart does NOT create the namespace
# (cluster-scoped resource — kept out so the chart fits a default-deny
# ArgoCD AppProject). The namespace must be created out-of-band — e.g. by
# the consumer's Terraform alongside the Kafka CRD bootstrap.
namespace:
  name: kafka-acl

# Strimzi standalone User Operator image. Upstream Quay registry. We do NOT
# build a custom image — the operator uses SASL/SCRAM to talk to MSK, which
# is supported natively by the stock image (no aws-msk-iam-auth jar needed).
image:
  repository: quay.io/strimzi/operator
  tag: "0.45.1"
  pullPolicy: IfNotPresent

# MSK SASL/SCRAM bootstrap endpoint — legacy hardcoded value. Used only
# when `brokersConfigMap.enabled` is false. Deprecated; prefer the
# ConfigMap-sourced path below.
mskBootstrapServersSaslScram: ""

# Source the broker endpoint from a consumer-provided K8s ConfigMap
# instead of the Helm value above. The ConfigMap key holds the bare
# comma-separated broker list (no protocol prefix — Strimzi UO accepts
# the bare form). Sourcing from K8s lets Terraform own the broker DNS
# and roll the operator pod on MSK broker changes without edits to
# ArgoCD values.
#
# Defaults disabled so existing consumers that pass
# `mskBootstrapServersSaslScram` continue to work.
brokersConfigMap:
  enabled: false
  name: msk-cluster-info
  key: STRIMZI_KAFKA_BOOTSTRAP_SERVERS

# AWS Secrets Manager secret name for the msk-acl-admin SCRAM credential.
# Created by infra-terraform `module.msk_acl_admin`. ExternalSecrets syncs
# this into a K8s Secret consumed as JAAS config.
mskAclAdminSecret:
  awsSecretName: ""   # e.g. AmazonMSK_msk-acl-admin-dev-xxxxxx
  k8sSecretName: msk-acl-admin-creds

# Whether to render the `ExternalSecret` resource that syncs the SCRAM
# admin credential from AWS Secrets Manager into the K8s Secret named in
# `mskAclAdminSecret.k8sSecretName`.
#
# Set to `false` if the consumer's cluster does NOT run the ExternalSecrets
# operator (https://external-secrets.io). When disabled, the consumer is
# responsible for creating the K8s Secret out-of-band — e.g. via Terraform
# `kubernetes_secret` that reads the AWS Secrets Manager value and writes a
# JAAS-format `admin.properties` key. The operator will pick the Secret up
# via `STRIMZI_KAFKA_ADMIN_CLIENT_CONFIGURATION` either way.
externalSecret:
  enabled: true

# ExternalSecrets store reference (used only when `externalSecret.enabled`
# is true) — must point at an existing ClusterSecretStore or SecretStore
# wired to AWS Secrets Manager in the target cluster. This chart does not
# create the store.
externalSecretStore:
  kind: ClusterSecretStore
  name: aws-secrets-manager

# Resource sizing — operator is lightweight (Java AdminClient + reconcile
# loop). 256Mi heap is plenty.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pod scheduling hints — empty defaults so the chart works on any cluster.
# Set per-consumer if the target cluster has tainted nodes (e.g. EKS Fargate
# adds `eks.amazonaws.com/compute-type=fargate:NoSchedule` to its nodes;
# consumer must supply a matching toleration).
nodeSelector: {}
tolerations: []
affinity: {}

# Reconcile cadence (ms). Strimzi default is 120000 (2 min). Keep default —
# our ACL change frequency is low.
fullReconciliationIntervalMs: 120000
