apiVersion: apps/v1
kind: Deployment
metadata:
  name: strimzi-user-operator
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: strimzi-user-operator
    app.kubernetes.io/part-of: strimzi-user-operator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: strimzi-user-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: strimzi-user-operator
        tags.datadoghq.com/env: {{ .Values.env }}
        tags.datadoghq.com/service: strimzi-user-operator
    spec:
      serviceAccountName: strimzi-user-operator
      containers:
        - name: user-operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: [/opt/strimzi/bin/user_operator_run.sh]
          env:
            # ── Watched namespace + reconcile cadence ─────────────────────
            - name: STRIMZI_NAMESPACE
              value: {{ .Values.namespace.name }}
            - name: STRIMZI_FULL_RECONCILIATION_INTERVAL_MS
              value: "{{ .Values.fullReconciliationIntervalMs }}"

            # ── Connect to MSK ───────────────────────────────────────────
            - name: STRIMZI_KAFKA_BOOTSTRAP_SERVERS
              {{- if .Values.brokersConfigMap.enabled }}
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.brokersConfigMap.name }}
                  key: {{ .Values.brokersConfigMap.key }}
              {{- else }}
              value: {{ .Values.mskBootstrapServersSaslScram | quote }}
              {{- end }}
            # SASL/SCRAM config block read from the ExternalSecret-synced
            # K8s Secret. Strimzi accepts free-form admin client properties.
            - name: STRIMZI_KAFKA_ADMIN_CLIENT_CONFIGURATION
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mskAclAdminSecret.k8sSecretName }}
                  key: admin.properties
            # MSK brokers serve a public-CA cert (Amazon Trust Services) —
            # no custom truststore needed.
            - name: STRIMZI_PUBLIC_CA
              value: "true"
            # Use Kafka AdminClient ACL APIs (MSK supports these). Without
            # this flag the operator tries the legacy ZooKeeper path which
            # MSK does not expose.
            - name: STRIMZI_ACLS_ADMIN_API_SUPPORTED
              value: "true"

            # ── Required-but-unused config (placeholder CA secrets) ──────
            # See templates/placeholder-ca-secrets.yaml.
            - name: STRIMZI_CA_CERT_NAME
              value: placeholder-ca-cert
            - name: STRIMZI_CA_KEY_NAME
              value: placeholder-ca-key
            # No credential generation (we use authorization-only KafkaUser
            # CRDs) — but the env var is still required by startup.
            - name: STRIMZI_CA_NAMESPACE
              value: {{ .Values.namespace.name }}
            - name: STRIMZI_SECRET_PREFIX
              value: "kafka-user-"
            - name: STRIMZI_CLUSTER_CA_CERT_SECRET_NAME
              value: placeholder-ca-cert
            - name: STRIMZI_EO_DEPLOYMENT_NAME
              value: strimzi-user-operator

            # ── Java tuning ──────────────────────────────────────────────
            - name: STRIMZI_JAVA_OPTS
              value: "-Xms128m -Xmx256m"
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /healthy
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
