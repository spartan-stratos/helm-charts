# Strimzi User Operator needs to (all within its watched namespace):
# - Read/write KafkaUser CRD instances
# - Read/write Secrets (would generate credentials IF authentication mode
#   were used — unused here but required by operator startup checks)
# - Create events (status reporting on KafkaUser CRDs)
#
# Namespace-scoped because the consumer sets STRIMZI_NAMESPACE on the
# Deployment to a single namespace — no cross-namespace watch needed.
# This keeps the chart deployable from a default-deny ArgoCD AppProject
# without needing cluster-scoped resource whitelist entries.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: strimzi-user-operator
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: strimzi-user-operator
rules:
  - apiGroups: ["kafka.strimzi.io"]
    resources:
      - kafkausers
      - kafkausers/status
    verbs: [get, list, watch, create, patch, update, delete]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create, patch, update, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: strimzi-user-operator
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: strimzi-user-operator
subjects:
  - kind: ServiceAccount
    name: strimzi-user-operator
    namespace: {{ .Values.namespace.name }}
roleRef:
  kind: Role
  name: strimzi-user-operator
  apiGroup: rbac.authorization.k8s.io
