# Sync msk-acl-admin SCRAM credential from AWS Secrets Manager into a K8s
# Secret the User Operator mounts as JAAS config.
#
# The AWS secret format (created by aws_msk_scram_secret_association in
# infra-terraform `modules/msk-scram-user`) is JSON:
#   { "username": "msk-acl-admin", "password": "<random>" }
#
# We render that as a JAAS-format properties file the operator reads via the
# STRIMZI_KAFKA_ADMIN_CLIENT_CONFIGURATION env var.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: msk-acl-admin-creds
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: strimzi-user-operator
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: {{ .Values.externalSecretStore.kind }}
    name: {{ .Values.externalSecretStore.name }}
  target:
    name: {{ .Values.mskAclAdminSecret.k8sSecretName }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Properties block sourced into STRIMZI_KAFKA_ADMIN_CLIENT_CONFIGURATION.
        # Username + password come from the AWS secret payload.
        admin.properties: |
          security.protocol=SASL_SSL
          sasl.mechanism=SCRAM-SHA-512
          sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
            username="{{ "{{ .username }}" }}" \
            password="{{ "{{ .password }}" }}" ;
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.mskAclAdminSecret.awsSecretName }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.mskAclAdminSecret.awsSecretName }}
        property: password
