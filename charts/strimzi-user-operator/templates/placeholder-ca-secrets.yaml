{{- /*
  Placeholder CA Secrets — workaround for Strimzi standalone User Operator
  requiring STRIMZI_CA_CERT_NAME / STRIMZI_CA_KEY_NAME even when the
  operator is configured for authorization-only mode (no credential
  generation, no `authentication:` block on KafkaUser CRDs).

  Upstream issue: https://github.com/strimzi/strimzi-kafka-operator/issues/8284

  Strimzi 0.45.x's startup actually PARSES the placeholder Secret —
  PemTrustSet.extractCerts() throws if no Secret data field ends in
  `.crt`, and the bytes are loaded into the Kafka AdminClient
  ssl.truststore.certificates (even with STRIMZI_PUBLIC_CA=true the
  Cluster-CA-secret path still feeds the truststore). A random
  self-signed CA there → JVM doesn't trust the cert MSK serves →
  SSL handshake fails before any auth happens.

  Fix: populate ca.crt with the Amazon Trust Services Root CA bundle
  (files/amazon-trust-roots.pem). Those are the roots that ultimately
  sign MSK broker certs, so the operator's Kafka client can complete
  the TLS handshake.

  The ca.key field still gets a throwaway genCA key — Strimzi parses
  the field but never uses it in authorization-only mode. Any valid
  PEM-encoded key satisfies the parser.
*/ -}}
{{- $ca := genCA "kafka-acl-placeholder-ca" 3650 -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: placeholder-ca-cert
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: strimzi-user-operator
    strimzi.io/kind: Kafka
type: Opaque
data:
  ca.crt: {{ .Files.Get "files/amazon-trust-roots.pem" | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: placeholder-ca-key
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: strimzi-user-operator
    strimzi.io/kind: Kafka
type: Opaque
data:
  ca.key: {{ $ca.Key | b64enc | quote }}
