apiVersion: v2
name: strimzi-user-operator
description: |
  Strimzi User Operator (standalone mode) pointed at an external Kafka
  cluster (e.g. AWS MSK).

  Deploys only namespace-scoped resources — Namespace, KafkaUser CRD
  definition, and cluster-scoped RBAC are the consumer's responsibility
  to bootstrap (typically via Terraform). This keeps the chart deployable
  from an ArgoCD AppProject without cluster-scoped resource whitelist
  entries.

  Manages Kafka ACL declaratively via KafkaUser CRDs. KafkaUser CRD
  instances live in the sibling `kafka-users` chart.
type: application
version: 0.3.4
appVersion: "0.45.1"
